<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Hoş Geldiniz</h2>
      <p>Lütfen hesabınıza giriş yapın</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" formControlName="email" placeholder="ornek@mail.com"
               [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input type="password" formControlName="password" placeholder="••••••"
               [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        Giriş Yap
      </button>
    </form>

    <div class="login-footer">
      <p>Hesabınız yok mu? <a routerLink="/register">Kayıt Ol</a></p>
    </div>
  </div>
</div>
