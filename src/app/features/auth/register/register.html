<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Yeni Hesap Oluştur</h2>
      <p>Aramıza katılmak için formu doldurun</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Ad Soyad</label>
        <input type="text" formControlName="fullName" placeholder="John Doe"
               [class.is-invalid]="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched">
      </div>

      <div class="form-group">
        <label>E-posta</label>
        <input type="email" formControlName="email" placeholder="ornek@mail.com"
               [class.is-invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Şifre</label>
            <input type="password" formControlName="password" placeholder="••••••">
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Şifre Tekrar</label>
            <input type="password" formControlName="confirmPassword" placeholder="••••••"
                   [class.is-invalid]="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
          </div>
        </div>
      </div>

      @if (registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched) {
        <small class="text-danger d-block mb-3">Şifreler birbiriyle eşleşmiyor!</small>
      }

      <button type="submit" class="btn-auth" [disabled]="registerForm.invalid">
        Kayıt Ol
      </button>
    </form>

    <div class="auth-footer">
      <p>Zaten hesabınız var mı? <a routerLink="/login">Giriş Yap</a></p>
    </div>
  </div>
</div>
